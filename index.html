<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini React</title>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      .toolbar { margin-bottom: 16px; display: flex; gap: 8px; }
      .toolbar button {
        padding: 6px 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #fff;
        cursor: pointer;
      }
      .toolbar button:disabled { opacity: 0.4; cursor: default; }
      .toolbar button:not(:disabled):hover { background: #f0f0f0; }
      .container { display: flex; gap: 40px; }
      .panel-wrapper { flex: 1; }
      .panel-wrapper h2 { color: #555; font-size: 14px; }
      .panel { border: 1px solid #ccc; padding: 16px; border-radius: 8px; min-height: 120px; }
    </style>
  </head>
  <body>
    <h1>Virtual DOM Diff & Patch Demo</h1>

    <div class="toolbar">
      <button id="btn-patch">Patch</button>
      <button id="btn-back" disabled>‚óÄ Ží§Ž°úÍįÄÍłį</button>
      <button id="btn-forward" disabled>žēěžúľŽ°úÍįÄÍłį ‚Ė∂</button>
    </div>

    <div class="container">
      <div class="panel-wrapper">
        <h2>žč§ž†ú žėĀžó≠ (žĚĹÍłį ž†Ąžö©)</h2>
        <div class="panel" id="real-area"><div>
            <h1>Hello</h1>
            <p style="color: blue">Virtual DOM Demo</p>
            <ul><li>Item 1</li><li>Item 2</li><li>Item 3</li></ul>
        </div></div>
      </div>
      <div class="panel-wrapper">
        <h2>ŪÖĆžä§Ūäł žėĀžó≠ (ŪéłžßĎ ÍįÄŽä•)</h2>
        <div class="panel" id="test-area"></div>
      </div>
    </div>

    <script type="module">
      import { domToVdom, renderTo, diff, applyPatches, createHistory } from "/src/lib.js";

      const realArea = document.getElementById("real-area");
      const testArea = document.getElementById("test-area");
      const btnPatch = document.getElementById("btn-patch");
      const btnBack = document.getElementById("btn-back");
      const btnForward = document.getElementById("btn-forward");

      // žīąÍłįŪôĒ ‚ÄĒ realAreaŽŹĄ renderToŽ°ú žě¨Ž†ĆŽćĒŽßĀŪēėžó¨ Í≥ĶŽįĪ ŪÖćžä§Ūäł ŽÖłŽďú ž†úÍĪį
      const initialVdom = domToVdom(realArea.firstElementChild);
      const history = createHistory(initialVdom);
      renderTo(realArea, initialVdom);
      renderTo(testArea, initialVdom);
      testArea.contentEditable = "true";

      function updateButtons() {
        btnBack.disabled = !history.canBack();
        btnForward.disabled = !history.canForward();
      }

      // Patch Ž≤ĄŪäľ
      btnPatch.addEventListener("click", () => {
        const newVdom = domToVdom(testArea.firstElementChild);
        const patches = diff(history.current(), newVdom);

        if (patches.length === 0) return;

        applyPatches(realArea.firstElementChild, patches);
        history.push(newVdom);
        updateButtons();
      });

      // Ží§Ž°úÍįÄÍłį
      btnBack.addEventListener("click", () => {
        const targetVdom = history.back();
        renderTo(realArea, targetVdom);
        renderTo(testArea, targetVdom);
        testArea.contentEditable = "true";
        updateButtons();
      });

      // žēěžúľŽ°úÍįÄÍłį
      btnForward.addEventListener("click", () => {
        const targetVdom = history.forward();
        renderTo(realArea, targetVdom);
        renderTo(testArea, targetVdom);
        testArea.contentEditable = "true";
        updateButtons();
      });
    </script>
  </body>
</html>
