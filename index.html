<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO List</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    ul { padding: 0; list-style: none; }
    li { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { tags, setRoot, useState } from './src/lib.js';
    const { div, h1, input, button, ul, li, span } = tags;

    const container = document.getElementById('root');

    function App() {
      const [todos, setTodos] = useState([]);
      const [nextId, setNextId] = useState(1);
      const [inputValue, setInputValue] = useState('');

      function addTodo() {
        const text = inputValue.trim();
        if (!text) return;
        setTodos([...todos, { id: nextId, text, done: false }]);
        setNextId(nextId + 1);
        setInputValue('');
      }

      function toggle(id) {
        setTodos(todos.map(t => t.id === id ? { ...t, done: !t.done } : t));
      }

      function remove(id) {
        setTodos(todos.filter(t => t.id !== id));
      }

      return div(
        h1('TODO'),
        div(
          input({
            value: inputValue,
            onInput: e => setInputValue(e.target.value),
            onKeydown: e => { if (e.key === 'Enter') addTodo(); },
            placeholder: '할 일을 입력하세요'
          }),
          button({ onClick: addTodo }, 'Add')
        ),
        ul(
          ...todos.map(todo =>
            li({ key: String(todo.id) },
              span({
                onClick: () => toggle(todo.id),
                style: {
                  cursor: 'pointer',
                  flex: '1',
                  textDecoration: todo.done ? 'line-through' : 'none',
                  color: todo.done ? '#999' : '#000'
                }
              }, todo.text),
              button({ onClick: () => remove(todo.id) }, '✕')
            )
          )
        )
      );
    }

    setRoot(App, container);
  </script>
</body>
</html>
