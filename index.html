<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO List</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; }
    ul { padding: 0; list-style: none; }
    li { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { tags, render, diff, applyPatches } from './src/lib.js';
    const { div, h1, input, button, ul, li, span } = tags;

    const container = document.getElementById('root');
    let state = { todos: [], nextId: 1, inputValue: '' };
    let currentVNode = null;

    function view(s) {
      return div(
        h1('TODO'),
        div(
          input({
            value: s.inputValue,
            onInput: e => { state.inputValue = e.target.value; },
            onKeydown: e => { if (e.key === 'Enter') addTodo(); },
            placeholder: '할 일을 입력하세요'
          }),
          button({ onClick: addTodo }, 'Add')
        ),
        ul(
          ...s.todos.map(todo =>
            li({ key: String(todo.id) },
              span({
                onClick: () => toggle(todo.id),
                style: {
                  cursor: 'pointer',
                  flex: '1',
                  textDecoration: todo.done ? 'line-through' : 'none',
                  color: todo.done ? '#999' : '#000'
                }
              }, todo.text),
              button({ onClick: () => remove(todo.id) }, '✕')
            )
          )
        )
      );
    }

    function update() {
      const newVNode = view(state);
      if (!currentVNode) {
        render(newVNode, container);
      } else {
        applyPatches(container.firstChild, diff(currentVNode, newVNode));
      }
      currentVNode = newVNode;
    }

    function addTodo() {
      const text = state.inputValue.trim();
      if (!text) return;
      state.todos.push({ id: state.nextId++, text, done: false });
      state.inputValue = '';
      update();
    }

    function toggle(id) {
      const todo = state.todos.find(t => t.id === id);
      todo.done = !todo.done;
      update();
    }

    function remove(id) {
      state.todos = state.todos.filter(t => t.id !== id);
      update();
    }

    update();
  </script>
</body>
</html>
