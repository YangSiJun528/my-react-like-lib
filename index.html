<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini React</title>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      .container { display: flex; gap: 40px; }
      .panel-wrapper { flex: 1; }
      .panel-wrapper h2 { color: #555; font-size: 14px; }
      .panel { border: 1px solid #ccc; padding: 16px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>Phase 1: DOM ↔ vDOM 라운드트립 검증</h1>
    <div class="container">
      <div class="panel-wrapper">
        <h2>Source (원본 DOM)</h2>
        <div class="panel" id="source"><div>
            <h1>Hello</h1>
            <p style="color: blue">Virtual DOM Demo</p>
            <ul><li>Item 1</li><li>Item 2</li><li>Item 3</li></ul>
        </div></div>
      </div>
      <div class="panel-wrapper">
        <h2>Target (vDOM → DOM 복원)</h2>
        <div class="panel" id="target"></div>
      </div>
    </div>

    <script type="module">
      import { domToVdom, vdomToDom, renderTo } from "/src/lib.js";

      const source = document.getElementById("source");
      const target = document.getElementById("target");

      // 1. source의 firstElementChild → vDOM 변환
      const vdom = domToVdom(source.firstElementChild);
      console.log("vDOM:", vdom);

      // 2. vDOM → target DOM 렌더링 (라운드트립)
      renderTo(target, vdom);

      // 3. 라운드트립 검증 (vDOM 레벨에서 비교 — 공백 차이 무시)
      const vdomRoundtrip = domToVdom(target.firstElementChild);
      const match = JSON.stringify(vdom) === JSON.stringify(vdomRoundtrip);
      console.log("라운드트립 일치:", match);
    </script>
  </body>
</html>
